name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build all modules
        run: |
          mvn install -DskipTests --no-transfer-progress -f itara-common/pom.xml
          mvn install -DskipTests --no-transfer-progress -f itara-agent/pom.xml
          mvn install -DskipTests --no-transfer-progress -f itara-transport-http/pom.xml
          mvn install -DskipTests --no-transfer-progress -f itara-observability-logging/pom.xml
          mvn install -DskipTests --no-transfer-progress -f itara-demo/pom.xml

      - name: Run demo (direct topology)
        run: ci/run-demo-direct.sh

      - name: Run demo (HTTP topology)
        run: ci/run-demo-http.sh
