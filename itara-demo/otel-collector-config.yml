extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

exporters:
  otlp/elastic:
    endpoint: "apm-server:8200"
    tls:
      insecure: true

  debug:
    verbosity: basic

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlp/elastic, debug]
    metrics:
      receivers: [otlp]
      exporters: [otlp/elastic, debug]
