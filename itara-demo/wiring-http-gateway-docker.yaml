# wiring-http-gateway-docker.yaml
# Gateway JVM: calls Calculator over HTTP
# host uses Docker Compose service name instead of localhost

components:
  - id: "gateway"

connections:
  - from: "gateway"
    to: "calculator"
    type: http
    host: "calculator"
    port: 8081
    serializer: "json"
  - from:
    to: "gateway"
    type: http
    port: 8082
    serializer: "json"
